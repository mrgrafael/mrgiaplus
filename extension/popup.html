<!DOCTYPE html>
<html>
  <head>
    <style>
      body { font-family: Arial; padding: 10px; width: 300px; }
      textarea { width: 100%; height: 80px; }
      button { margin-top: 5px; width: 100%; padding: 8px; }
    </style>
  </head>
  <body>
    <h3>MRG IA Disparador</h3>
    <textarea id="lista" placeholder='[{"numero":"5599999999999","mensagem":"Olá!"}]'></textarea>
    <button onclick="start()">▶️ Play</button>
    <button onclick="pause()">⏸ Pause</button>
    <button onclick="stop()">⏹ Stop</button>
    <script>
      function start() {
        const lista = document.getElementById("lista").value;
        localStorage.setItem("listaDisparo", lista);
        localStorage.setItem("indexAtual", "0");
        alert("Disparo iniciado!");
      }
      function pause() {
        alert("Pausado (simulado)");
      }
      function stop() {
        localStorage.setItem("indexAtual", "0");
        alert("Disparo parado!");
      }
    </script>
  </body>
</html>
